<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0b" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="방탈출을 하고싶어요 - @want_escape_ 의 방탈출 리뷰 아카이브" />
    <title>방탈출을 하고싶어요 · 리뷰 아카이브</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="방탈출을 하고싶어요" />
    <meta property="og:title" content="방탈출을 하고싶어요 · 리뷰 아카이브" />
    <meta
      property="og:description"
      content="@want_escape_ 가 직접 플레이한 방탈출 테마 리뷰·추천도·한줄평을 한 곳에서 탐색하세요."
    />
    <meta property="og:url" content="https://want-escape.vercel.app/" />
    <meta property="og:image" content="https://want-escape.vercel.app/logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="ko_KR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="방탈출을 하고싶어요 · 리뷰 아카이브" />
    <meta
      name="twitter:description"
      content="@want_escape_ 가 직접 플레이한 방탈출 테마 리뷰·추천도·한줄평을 한 곳에서 탐색하세요."
    />
    <meta name="twitter:image" content="https://want-escape.vercel.app/logo.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    />
    <script>
      // Prevent theme flash: apply stored/preferred theme before React mounts.
      (function () {
        try {
          var stored = localStorage.getItem('we-theme');
          var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
